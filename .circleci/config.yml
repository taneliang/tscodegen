version: 2.1

jobs:
  build:
    working_directory: ~/tscodegen
    docker:
      - image: cimg/node:lts
    steps:
      - checkout
      - restore_cache:
          keys:
            - v4-node-{{ arch }}-{{ .Branch }}-{{ checksum "yarn.lock" }}
            - v4-node-{{ arch }}-{{ .Branch }}-
            - v4-node-{{ arch }}-
      - run:
          name: Install Dependencies
          command: yarn --frozen-lockfile --cache-folder ~/.cache/yarn --non-interactive
      - save_cache:
          key: v4-node-{{ arch }}-{{ .Branch }}-{{ checksum "yarn.lock" }}
          paths:
            - ~/.cache/yarn
            - node_modules
      - run:
          name: Typecheck Code
          command: yarn typecheck
      - run:
          name: Run Linters
          command: yarn lint
      - run:
          name: Test code
          environment:
            NODE_ENV: test
          command: yarn test:coverage
      - store_test_results:
          path: test-reports
      - store_artifacts:
          path: coverage
